name: Bot Miami Alertas
on:
  schedule:
    # Corre todos los días a las 09:00 y 21:00 UTC
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde el botón "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para guardar el historial
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install -r requirements.txt

      - name: Correr el bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python bot.py

      - name: Guardar historial actualizado
        run: |
          git config --global user.name "Bot Miami"
          git config --global user.email "bot@example.com"
          git add history.json
          git commit -m "Actualizar historial de precios" || exit 0
          git push
